version: 2.1
orbs:
  architect: giantswarm/architect@9.1.0

workflows:
  build:
    jobs:
    - architect/go-build:
        name: go-build-mcp-kubernetes
        binary: mcp-kubernetes
        context: architect
        # yamllint disable-line rule:line-length
        architectures: "linux/amd64,linux/arm64,darwin/amd64,darwin/arm64,windows/amd64,windows/arm64"
        filters:
          tags:
            only: /^v.*/

    - architect/upload-release-assets:
        context: architect
        name: upload-release-assets
        binary: mcp-kubernetes
        requires:
        - go-build-mcp-kubernetes
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/

    # Branch builds: multi-arch image to gsoci for PR validation. v9's
    # push-to-registries always uses buildx and derives the platforms from
    # go-build's .platforms file (linux/amd64,linux/arm64 by default).
    - architect/push-to-registries:
        context: architect
        name: push-to-registries
        # Cap docker buildx to the two linux platforms. Without this, the orb
        # auto-derives --platform from go-build's .platforms file, which now
        # contains all six binary targets (darwin/* and windows/* included).
        # buildx then tries to produce darwin and windows manifests under
        # QEMU emulation and hangs past the 10-minute no_output_timeout.
        # Match the muster / mcp-prometheus / 10 other repos pattern.
        platforms: "linux/amd64,linux/arm64"
        requires:
        - go-build-mcp-kubernetes
        filters:
          branches:
            ignore:
            - main

    # Tag builds: push multi-arch image to gsoci + gsociprivate. Aliyun is
    # handled by the sync-china-registry job below (orb's split-china-push
    # mechanism), so the buildx push no longer crosses the Pacific.
    - architect/push-to-registries:
        context: architect
        name: push-to-registries-release
        split-china-push: true
        # See note on the branch-build job above -- same reason.
        platforms: "linux/amd64,linux/arm64"
        requires:
        - go-build-mcp-kubernetes
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/

    # Mirror gsoci -> Aliyun via the in-China giantswarm/galaxy-runner. Runs
    # in parallel with the chart catalog push; Aliyun mirror failures do NOT
    # block the chart publish.
    - architect/sync-china-registry:
        context: architect
        name: sync-china-registry
        requires:
        - push-to-registries-release
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/

    - architect/push-to-app-catalog:
        executor: app-build-suite
        context: architect
        name: build-mcp-kubernetes-chart
        app_catalog: giantswarm-catalog
        app_catalog_test: giantswarm-test-catalog
        chart: mcp-kubernetes
        push_to_appcatalog: false
        push_to_oci_registry: false
        persist_chart_archive: true
        requires:
        - go-build-mcp-kubernetes
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore:
            - main

    - architect/run-tests-with-ats:
        name: execute chart tests
        requires:
        - build-mcp-kubernetes-chart
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore:
            - main

    # Branch: push chart (git catalog + OCI per architect default) after tests + image
    - architect/push-to-app-catalog:
        executor: app-build-suite
        context: architect
        name: push-mcp-kubernetes-to-giantswarm-app-catalog
        app_catalog: giantswarm-catalog
        app_catalog_test: giantswarm-test-catalog
        chart: mcp-kubernetes
        requires:
        - execute chart tests
        - push-to-registries
        filters:
          branches:
            ignore:
            - main

    # Tag: push chart after tests + the gsoci image. Intentionally does NOT
    # depend on sync-china-registry so the chart catalog can publish even if
    # the in-China Aliyun mirror is slow or fails.
    - architect/push-to-app-catalog:
        executor: app-build-suite
        context: architect
        name: push-mcp-kubernetes-to-giantswarm-app-catalog-release
        app_catalog: giantswarm-catalog
        app_catalog_test: giantswarm-test-catalog
        chart: mcp-kubernetes
        requires:
        - execute chart tests
        - push-to-registries-release
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/
